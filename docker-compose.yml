services:
  lesson-generator:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lesson-generator
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "28743:28743"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:28743/health/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
